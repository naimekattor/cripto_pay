<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto Payment Portal</title>
    <!-- Reliable CDN for Ethers.js -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link rel="icon" href="data:," />
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #0f172a;
        color: #f8fafc;
      }
      .card {
        background: #1e293b;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
        text-align: center;
        border: 1px solid #334155;
      }
      h2 {
        margin-bottom: 24px;
        color: #38bdf8;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 15px 0;
        border-radius: 8px;
        border: 1px solid #475569;
        background: #0f172a;
        color: white;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 14px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 16px;
        transition: 0.3s;
      }
      .connect {
        background: #f6851b;
        color: white;
      }
      .connect:hover {
        background: #e27613;
      }
      .pay {
        background: #0ea5e9;
        color: white;
      }
      .pay:hover {
        background: #0284c7;
      }
      .status {
        margin-top: 15px;
        font-size: 14px;
        color: #94a3b8;
        word-break: break-all;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Secure Payment</h2>

      <!-- Connect Wallet View -->
      <div id="connectView">
        <p>Connect your MetaMask (Sepolia) to continue.</p>
        <button id="connectBtn" class="connect">Connect MetaMask</button>
      </div>

      <!-- Payment View -->
      <div id="paymentArea" class="hidden">
        <p style="font-size: 13px">
          Connected: <br /><span id="userAddress" style="color: #38bdf8"></span>
        </p>

        <label style="display: block; text-align: left; font-size: 14px"
          >Amount (Sepolia ETH):</label
        >
        <input
          type="number"
          id="amount"
          value="0.005"
          step="0.001"
          min="0.0001"
        />

        <button id="payBtn" class="pay">Pay Now</button>
        <div id="statusMsg" class="status"></div>
      </div>
    </div>

    <script>
      // YOUR SERVER WALLET ADDRESS
      const SERVER_WALLET = "0xd37775252869a5b07061a8951ca30de7ed8d5bf1";
      let signer;

      const connectBtn = document.getElementById("connectBtn");
      const payBtn = document.getElementById("payBtn");
      const statusMsg = document.getElementById("statusMsg");

      // 1. Connect Wallet Logic
      connectBtn.onclick = async () => {
        if (typeof ethers === "undefined") {
          alert(
            "Ethers library failed to load. Check your internet or ad-blocker.",
          );
          return;
        }

        if (window.ethereum) {
          try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            // Request account access
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();

            const address = await signer.getAddress();
            const network = await provider.getNetwork();

            // Ensure user is on Sepolia (Chain ID 11155111)
            if (network.chainId !== 11155111) {
              alert("Please switch your MetaMask to the Sepolia Test Network!");
              return;
            }

            document.getElementById("userAddress").innerText = address;
            document.getElementById("connectView").classList.add("hidden");
            document.getElementById("paymentArea").classList.remove("hidden");
          } catch (err) {
            console.error(err);
            alert("Connection failed.");
          }
        } else {
          alert("MetaMask not detected. Please install the extension.");
        }
      };

      // 2. Payment Logic
      payBtn.onclick = async () => {
        const amount = document.getElementById("amount").value;
        if (!amount || amount <= 0)
          return alert("Please enter a valid amount.");

        statusMsg.innerText = "Waiting for confirmation...";
        payBtn.disabled = true;
        payBtn.innerText = "Processing...";

        try {
          const tx = await signer.sendTransaction({
            to: SERVER_WALLET,
            value: ethers.utils.parseEther(amount.toString()),
          });

          statusMsg.innerHTML = `Success! <br> Hash: <a href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank" style="color:#38bdf8;">${tx.hash.substring(0, 20)}...</a>`;
          console.log("Tx Hash Sent to Backend:", tx.hash);

          // Re-enable button after success
          payBtn.disabled = false;
          payBtn.innerText = "Pay Again";
        } catch (err) {
          console.error(err);
          statusMsg.innerText = "Transaction failed or cancelled.";
          payBtn.disabled = false;
          payBtn.innerText = "Pay Now";
        }
      };
    </script>
  </body>
</html>
